<!DOCTYPE html>
<html>
<head>
  <title>Fashion Clique</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #111; color: white; padding: 15px; text-align: center; }
    .container { padding: 20px; }
    button { padding: 8px 15px; margin: 5px 0; cursor: pointer; }
    input, select { padding: 8px; margin: 5px 0; width: 100%; }
    .product { background: white; padding: 10px; margin: 10px 0; border-radius: 5px; }
    #adminPanel { display: none; background: #fff; padding: 15px; margin-top: 20px; }
  </style>
</head>

<body>

<header>
  <h2>Fashion Clique</h2>
</header>

<div class="container">

  <h3>Products</h3>
  <div id="productList"></div>

  <hr>

  <h3>Admin Login</h3>
  <input type="password" id="adminPass" placeholder="Enter Admin Password">
  <button onclick="login()">Login</button>

  <div id="adminPanel">
    <h3>Add Product</h3>
    <input type="text" id="pName" placeholder="Product Name">
    <input type="text" id="pPrice" placeholder="Product Price">
    
    <select id="pCategory">
      <option>Shoes</option>
      <option>Shirts</option>
      <option>Pants</option>
      <option>Clothes</option>
      <option>Combo</option>
      <option>Watches</option>
      <option>Gadgets</option>
      <option>Footwear</option>
    </select>

    <button onclick="addProduct()">Add Product</button>
  </div>

</div>

<script>
  const ADMIN_PASSWORD = "fc@123";
  let products = [];

  function login() {
    const pass = document.getElementById("adminPass").value;
    if (pass === ADMIN_PASSWORD) {
      document.getElementById("adminPanel").style.display = "block";
      alert("Login Successful");
    } else {
      alert("Wrong Password");
    }
  }

  function addProduct() {
    const name = document.getElementById("pName").value;
    const price = document.getElementById("pPrice").value;
    const category = document.getElementById("pCategory").value;

    if (name && price) {
      products.push({ name, price, category });
      displayProducts();
    }
  }

  function displayProducts() {
    const list = document.getElementById("productList");
    list.innerHTML = "";
    products.forEach(p => {
      list.innerHTML += `
        <div class="product">
          <h4>${p.name}</h4>
          <p>₹${p.price}</p>
          <p>Category: ${p.category}</p>
        </div>
      `;
    });
  }
</script>

</body>
                      </html>
