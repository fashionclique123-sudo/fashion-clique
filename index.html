<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Clique Login</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: #121212;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .login-container {
    background: #1f1f1f;
    padding: 30px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
    text-align: center;
  }
  h1 {
    color: #4caf50;
    margin-bottom: 20px;
  }
  input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
    background: #2c2c2c;
    color: #fff;
    font-size: 16px;
  }
  button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #4caf50;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
  }
  button:hover {
    background: #45a049;
  }
  .skip-btn {
    background: #333;
  }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  // ------------------- FIREBASE CONFIG -------------------
  const firebaseConfig = {
    apiKey: "AIzaSyCi1xjKpEqjPKfEffqjFZ9Q-61INIyvqLE",
    authDomain: "fashion-clique.firebaseapp.com",
    databaseURL: "https://fashion-clique-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "fashion-clique",
    storageBucket: "fashion-clique.firebasestorage.app",
    messagingSenderId: "136880158986",
    appId: "1:136880158986:web:cd0cd16849979ebf68a2f3",
    measurementId: "G-G938C4R8TV"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  // ------------------- END FIREBASE CONFIG -------------------

  function customerLogin() {
    const name = document.getElementById('cName').value;
    const phone = document.getElementById('cPhone').value;

    if (!name || !phone) {
      alert("Please enter name and phone number");
      return;
    }

    // Save customer info in Firebase (optional)
    const newCustRef = db.ref("customers").push();
    newCustRef.set({ name, phone });

    // Redirect to main page
    window.location.href = "main.html"; 
  }

  function skipLogin() {
    // Skip login, go to main page
    window.location.href = "main.html";
  }
</script>
</head>
<body>

<div class="login-container">
  <h1>Fashion Clique</h1>
  <input type="text" id="cName" placeholder="Your Name">
  <input type="tel" id="cPhone" placeholder="Phone Number">
  <button onclick="customerLogin()">Login</button>
  <button class="skip-btn" onclick="skipLogin()">Later / Skip</button>
</div>

</body>
</html>
