<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Clique</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "fashion-clique.firebaseapp.com",
  databaseURL: "https://fashion-clique-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "fashion-clique",
  storageBucket: "fashion-clique.appspot.com",
  messagingSenderId: "136880158986",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<style>
body{margin:0;font-family:'Roboto',sans-serif;background:#121212;color:#fff;}
header{background:#1f1f1f;padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
header h1{color:#4caf50;font-size:24px;}
nav{display:flex;flex-wrap:wrap;}
nav button{margin:5px 5px;padding:8px 12px;background:#333;color:#fff;border:none;border-radius:5px;cursor:pointer;}
nav button:hover{background:#4caf50;}
.container{padding:15px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;}
.card{background:#1f1f1f;padding:10px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.5);transition:transform 0.2s;}
.card:hover{transform:scale(1.05);}
.card img{width:100%;border-radius:10px;cursor:pointer;}
.card h3,h4{margin:5px 0;}
.card button{padding:6px 10px;background:#4caf50;border:none;color:#fff;border-radius:4px;cursor:pointer;}
.card button:hover{background:#45a049;}
.admin-panel{background:#1f1f1f;padding:15px;margin:15px;border-radius:10px;}
form input, form select{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:none;background:#2c2c2c;color:#fff;}
#orderForm{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:9999;}
#orderForm form{background:#1f1f1f;padding:20px;border-radius:10px;width:90%;max-width:400px;position:relative;}
#closeForm{position:absolute;top:10px;right:15px;cursor:pointer;color:#f44336;font-weight:bold;font-size:18px;}
@media(max-width:600px){header h1{width:100%;text-align:center;margin-bottom:10px;}nav{width:100%;justify-content:center;}}
</style>
</head>
<body>

<header>
<h1>Fashion Clique</h1>
<nav id="categoryNav"></nav>
<button onclick="showAdminLogin()">Admin Login</button>
</header>

<div id="adminPanel" class="admin-panel" style="display:none;">
<h2>Admin Panel</h2>
<input type="password" id="adminPass" placeholder="Enter password">
<button onclick="adminLogin()">Login</button>
<div id="adminActions" style="display:none;">
<h3>Add Product</h3>
<input type="text" id="pName" placeholder="Product Name">
<input type="number" id="pPrice" placeholder="Price in ₹">
<input type="text" id="pCategory" placeholder="Category">
<input type="text" id="pImage" placeholder="Image URL">
<select id="pType">
  <option value="single">Single</option>
  <option value="combo">Combo</option>
</select>
<button onclick="addProduct()">Add Product</button>
<h3>Logout</h3>
<button onclick="logoutAdmin()">Logout</button>
</div>
</div>

<div class="container" id="productContainer"></div>

<div id="orderForm">
<form onsubmit="submitOrder(event)">
<span id="closeForm" onclick="closeForm()">X</span>
<h2>Place Order</h2>
<input type="text" id="cName" placeholder="Your Name" required>
<input type="tel" id="cPhone" placeholder="Phone Number" required>
<input type="text" id="cAddress" placeholder="Address" required>
<input type="text" id="oProduct" placeholder="Product" readonly>
<select id="oSize" required>
<option value="">Select Size</option>
<option value="S">S</option>
<option value="M">M</option>
<option value="L">L</option>
<option value="XL">XL</option>
</select>
<select id="oColor" required>
<option value="">Select Color</option>
<option value="Black">Black</option>
<option value="White">White</option>
<option value="Red">Red</option>
<option value="Blue">Blue</option>
</select>
<input type="number" id="oQty" placeholder="Quantity" value="1" min="1" required>
<select id="oPayment" required>
<option value="">Select Payment</option>
<option value="COD">Cash On Delivery (+₹200)</option>
<option value="UPI">UPI</option>
<option value="WhatsApp">WhatsApp Order</option>
</select>
<button type="submit">Submit Order</button>
</form>
</div>

<script>
let categories = ["Shoes","Shirts","Pants","Clothes","Combo","Watches","Gadgets","Footwear"];
const categoryNav = document.getElementById('categoryNav');
categories.forEach(cat => {
  let btn = document.createElement('button');
  btn.innerText = cat;
  btn.onclick = () => displayProducts(cat);
  categoryNav.appendChild(btn);
});

let productContainer = document.getElementById('productContainer');
function displayProducts(filter=""){
  productContainer.innerHTML="";
  db.ref("products").once("value",snapshot=>{
    snapshot.forEach(child=>{
      let p = child.val();
      if(filter=="" || p.category==filter){
        let card = document.createElement('div');
        card.className="card";
        card.innerHTML=`<img src="${p.image}" onclick="zoomImage('${p.image}')"><h3>${p.name}</h3><h4>₹${p.price}</h4><button onclick="openForm('${p.name}')">Order</button>`;
        productContainer.appendChild(card);
      }
    });
  });
}
displayProducts();

function showAdminLogin(){document.getElementById('adminPanel').style.display="block";}
function adminLogin(){
  let pass=document.getElementById('adminPass').value;
  if(pass=="fc@123"){document.getElementById('adminActions').style.display="block";alert("Admin logged in");}
  else{alert("Wrong password");}
}
function logoutAdmin(){document.getElementById('adminActions').style.display="none";document.getElementById('adminPass').value="";}

function addProduct(){
  let name=document.getElementById('pName').value;
  let price=document.getElementById('pPrice').value;
  let category=document.getElementById('pCategory').value;
  let image=document.getElementById('pImage').value;
  let type=document.getElementById('pType').value;
  if(name && price && category && image){
    let newProdRef=db.ref("products").push();
    newProdRef.set({name,price,category,image,type});
    alert("Product added");
    document.getElementById('pName').value="";document.getElementById('pPrice').value="";document.getElementById('pCategory').value="";document.getElementById('pImage').value="";
    displayProducts();
  } else {alert("Fill all fields");}
}

let orderProduct="";
function openForm(name){orderProduct=name;document.getElementById('oProduct').value=name;document.getElementById('orderForm').style.display="flex";}
function closeForm(){document.getElementById('orderForm').style.display="none";}
function submitOrder(e){
  e.preventDefault();
  let cName=document.getElementById('cName').value;
  let cPhone=document.getElementById('cPhone').value;
  let cAddress=document.getElementById('cAddress').value;
  let oSize=document.getElementById('oSize').value;
  let oColor=document.getElementById('oColor').value;
  let oQty=document.getElementById('oQty').value;
  let oPayment=document.getElementById('oPayment').value;
  let total="₹"+(parseInt(oQty)*200);
  let message=`*Order Received*\nName: ${cName}\nPhone: ${cPhone}\nAddress: ${cAddress}\nProduct: ${orderProduct}\nSize: ${oSize}\nColor: ${oColor}\nQuantity: ${oQty}\nPayment: ${oPayment}\nTotal: ${total}`;
  window.open(`https://wa.me/917594849347?text=${encodeURIComponent(message)}`,"_blank");
  closeForm();
}

function zoomImage(src){
  let imgWin=window.open("");
  imgWin.document.write(`<img src="${src}" style="width:100%">`);
}
</script>

</body>
  </html>
