<header style="display:flex;align-items:center;justify-content:space-between;padding:10px 15px;background:#1f1f1f;color:#fff;flex-wrap:wrap;">
  <!-- Logo -->
  <div id="logo-container" style="display:flex;align-items:center;gap:10px;">
    <img id="siteLogo" src="logo.png" alt="Logo" style="height:40px;border-radius:5px;">
    <h1 style="color:#4caf50;margin:0;font-size:22px;">Fashion Clique</h1>
  </div>

  <!-- Search Bar -->
  <div style="flex:1;margin:0 15px;">
    <input type="text" id="searchInput" placeholder="Search products..." 
           style="width:100%;padding:8px;border-radius:5px;border:none;background:#2c2c2c;color:#fff;">
  </div>

  <!-- Category Buttons -->
  <nav id="categoryNav" style="display:flex;gap:5px;flex-wrap:wrap;"></nav>

  <!-- Theme & Admin -->
  <div style="display:flex;gap:10px;align-items:center;">
    <button id="themeSwitch" style="padding:6px 10px;background:#333;color:#fff;border:none;border-radius:5px;cursor:pointer;">Light/Dark</button>
    <button id="adminLoginBtn" style="padding:6px 10px;background:#4caf50;color:#fff;border:none;border-radius:5px;cursor:pointer;">Admin Login</button>
  </div>
</header>
