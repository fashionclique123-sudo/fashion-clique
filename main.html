<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Clique</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {margin:0;font-family:'Roboto',sans-serif;background:#121212;color:#fff;}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;background:#1f1f1f;color:#fff;flex-wrap:wrap;}
#logo-container img{height:40px;border-radius:5px;}
#logo-container h1{color:#4caf50;margin:0;font-size:22px;}
#categoryNav button{margin:2px;padding:6px 10px;background:#333;color:#fff;border:none;border-radius:5px;cursor:pointer;}
#categoryNav button:hover{background:#4caf50;}
#searchInput{padding:6px;border-radius:5px;border:none;background:#2c2c2c;color:#fff;width:100%;}
#themeSwitch,#adminLoginBtn{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;}
#themeSwitch{background:#333;color:#fff;} #adminLoginBtn{background:#4caf50;color:#fff;}
.marquee-offers{background:#222;color:#4caf50;padding:5px;text-align:center;overflow:hidden;white-space:nowrap;}
.marquee-offers span{display:inline-block;padding-right:50px;animation:marquee 15s linear infinite;}
@keyframes marquee{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
.container{padding:15px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;}
.card{background:#1f1f1f;padding:10px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.5);transition:transform 0.2s;}
.card:hover{transform:scale(1.05);}
.card img{width:100%;border-radius:10px;cursor:pointer;}
.card h3,h4{margin:5px 0;}
.card button{padding:6px 10px;background:#4caf50;border:none;color:#fff;border-radius:4px;cursor:pointer;}
.card button:hover{background:#45a049;}
#orderForm{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:9999;}
#orderForm form{background:#1f1f1f;padding:20px;border-radius:10px;width:90%;max-width:400px;position:relative;}
#closeForm{position:absolute;top:10px;right:15px;cursor:pointer;color:#f44336;font-weight:bold;font-size:18px;}
.admin-panel{background:#1f1f1f;padding:15px;margin:15px;border-radius:10px;display:none;}
form input, form select{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:none;background:#2c2c2c;color:#fff;}
#ratingSection{margin-top:10px;}
.rating-star{cursor:pointer;font-size:22px;color:#888;margin-right:5px;}
.rating-star.selected{color:#4caf50;}
.light-theme{background:#fff;color:#000;}
.light-theme input, .light-theme select{background:#eee;color:#000;}
.light-theme #categoryNav button{background:#ddd;color:#000;}
.light-theme #categoryNav button:hover{background:#4caf50;color:#fff;}
</style>
</head>
<body>

<header>
  <!-- Logo -->
  <div id="logo-container">
    <img id="siteLogo" src="logo.png" alt="Logo">
    <h1>Fashion Clique</h1>
  </div>

  <!-- Search Bar -->
  <div style="flex:1;margin:0 15px;">
    <input type="text" id="searchInput" placeholder="Search products...">
  </div>

  <!-- Category Buttons -->
  <nav id="categoryNav"></nav>

  <!-- Theme & Admin -->
  <div style="display:flex;gap:10px;align-items:center;">
    <button id="themeSwitch">Light/Dark</button>
    <button id="adminLoginBtn">Admin Login</button>
  </div>
</header>

<div class="marquee-offers"><span id="offerText">Welcome to Fashion Clique! Big Offers Await!</span></div>

<div id="adminPanel" class="admin-panel">
<h2>Admin Panel</h2>
<input type="password" id="adminPass" placeholder="Enter password">
<button onclick="adminLogin()">Login</button>

<div id="adminActions" style="display:none;">
<h3>Add Product</h3>
<input type="text" id="pName" placeholder="Product Name">
<input type="number" id="pPrice" placeholder="Price in ₹">
<input type="number" id="pCost" placeholder="Cost Price in ₹">
<input type="text" id="pCategory" placeholder="Category">
<input type="text" id="pImage" placeholder="Image URL (1+ images comma separated)">
<select id="pType">
  <option value="single">Single</option>
  <option value="combo">Combo</option>
</select>
<button onclick="addProduct()">Add Product</button>

<h3>Offers</h3>
<input type="text" id="offerInput" placeholder="Enter new offer">
<button onclick="updateOffer()">Update Marquee</button>

<h3>Upload Logo</h3>
<input type="text" id="logoInput" placeholder="Logo Image URL">
<button onclick="updateLogo()">Update Logo</button>

<h3>Profit / Expenses</h3>
<input type="number" id="expenseInput" placeholder="Add Expense ₹">
<button onclick="addExpense()">Add Expense</button>
<div id="profitSummary">Net Profit: ₹0</div>

<h3>Logout</h3>
<button onclick="logoutAdmin()">Logout</button>
</div>
</div>

<div class="container" id="productContainer"></div>

<!-- Order Form -->
<div id="orderForm">
<form onsubmit="submitOrder(event)">
<span id="closeForm" onclick="closeForm()">X</span>
<h2>Place Order</h2>
<input type="text" id="cName" placeholder="Your Name" required>
<input type="tel" id="cPhone" placeholder="Phone Number" required>
<input type="text" id="cAddress" placeholder="Address" required>
<input type="text" id="oProduct" placeholder="Product" readonly>
<select id="oSize" required>
<option value="">Select Size</option>
<option value="S">S</option>
<option value="M">M</option>
<option value="L">L</option>
<option value="XL">XL</option>
</select>
<select id="oColor" required>
<option value="">Select Color</option>
<option value="Black">Black</option>
<option value="White">White</option>
<option value="Red">Red</option>
<option value="Blue">Blue</option>
</select>
<input type="number" id="oQty" placeholder="Quantity" value="1" min="1" required>
<select id="oPayment" required>
<option value="">Select Payment</option>
<option value="COD">Cash On Delivery (+₹200)</option>
<option value="UPI">UPI</option>
<option value="WhatsApp">WhatsApp Order</option>
</select>
<button type="submit">Submit Order</button>
</form>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCi1xjKpEqjPKfEffqjFZ9Q-61INIyvqLE",
  authDomain: "fashion-clique.firebaseapp.com",
  databaseURL: "https://fashion-clique-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fashion-clique",
  storageBucket: "fashion-clique.firebasestorage.app",
  messagingSenderId: "136880158986",
  appId: "1:136880158986:web:cd0cd16849979ebf68a2f3",
  measurementId: "G-G938C4R8TV"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let categories = ["Shoes","Shirts","Pants","Clothes","Combo","Watches","Gadgets","Footwear"];
const categoryNav = document.getElementById('categoryNav');
categories.forEach(cat => {
  let btn = document.createElement('button');
  btn.innerText = cat;
  btn.onclick = () => displayProducts(cat);
  categoryNav.appendChild(btn);
});

let productContainer = document.getElementById('productContainer');
function displayProducts(filter=""){
  let searchTerm = document.getElementById('searchInput').value.toLowerCase();
  productContainer.innerHTML="";
  db.ref("products").once("value",snapshot=>{
    snapshot.forEach(child=>{
      let p = child.val();
      if((filter=="" || p.category==filter) && (!searchTerm || p.name.toLowerCase().includes(searchTerm))){
        let card = document.createElement('div');
        card.className="card";
        card.innerHTML=`<img src="${p.image.split(',')[0]}" onclick="zoomImage('${p.image.split(',')[0]}')"><h3>${p.name}</h3><h4>₹${p.price}</h4><button onclick="openForm('${p.name}')">Order</button>`;
        productContainer.appendChild(card);
      }
    });
  });
}
displayProducts();

document.getElementById('searchInput').addEventListener('input',()=>displayProducts());

function zoomImage(src){let imgWin=window.open("");imgWin.document.write(`<img src="${src}" style="width:100%">`);}

// ---------------- Admin ----------------
function showAdmin(){document.getElementById('adminPanel').style.display="block";}
document.getElementById('adminLoginBtn').onclick = showAdmin;

function adminLogin(){
  let pass=document.getElementById('adminPass').value;
  if(pass=="fc@123"){document.getElementById('adminActions').style.display="block";alert("Admin logged in");}
  else{alert("Wrong password");}
}
function logoutAdmin(){document.getElementById('adminActions').style.display="none";document.getElementById('adminPass').value="";}

// Add product
function addProduct(){
  let name=document.getElementById('pName').value;
  let price=parseInt(document.getElementById('pPrice').value);
  let cost=parseInt(document.getElementById('pCost').value);
  let category=document.getElementById('pCategory').value;
  let image=document.getElementById('pImage').value;
  let type=document.getElementById('pType').value;
  if(name && price && category && image){
    let newProdRef=db.ref("products").push();
    newProdRef.set({name,price,cost,category,image,type});
    alert("Product added"); displayProducts();
  } else alert("Fill all fields");
}

// Marquee offers
function updateOffer(){
  let offer=document.getElementById('offerInput').value;
  if(offer){document.getElementById('offerText').innerText=offer;document.getElementById('offerInput').value="";}
}

// Logo update
function updateLogo(){let url=document.getElementById('logoInput').value;if(url){document.getElementById('siteLogo').src=url;}}

// Order form
let orderProduct="";
function openForm(name){orderProduct=name;document.getElementById('oProduct').value=name;document.getElementById('orderForm').style.display="flex";}
function closeForm(){document.getElementById('orderForm').style.display="none";}
function submitOrder(e){
  e.preventDefault();
  let cName=document.getElementById('cName').value;
  let cPhone=document.getElementById('cPhone').value;
  let cAddress=document.getElementById('cAddress').value;
  let oSize=document.getElementById('oSize').value;
  let oColor=document.getElementById('oColor').value;
  let oQty=document.getElementById('oQty').value;
  let oPayment=document.getElementById('oPayment').value;
  let total="₹"+(parseInt(oQty)*200);
  let message=`*Order Received*\nName: ${cName}\nPhone: ${cPhone}\nAddress: ${cAddress}\nProduct: ${orderProduct}\nSize: ${oSize}\nColor: ${oColor}\nQuantity: ${oQty}\nPayment: ${oPayment}\nTotal: ${total}`;
  window.open(`https://wa.me/917594849347?text=${encodeURIComponent(message)}`,"_blank");
  closeForm();
}

// Theme switch
document.getElementById('themeSwitch').onclick = () => document.body.classList.toggle('light-theme');

// ---------------- Profit/Expenses ----------------
let totalProfit=0, totalExpenses=0;
function addExpense(){
  let exp=parseInt(document.getElementById('expenseInput').value);
  if(exp){totalExpenses+=exp;updateProfit();document.getElementById('expenseInput').value="";}
}
function updateProfit(){
  db.ref("products").once("value",snapshot=>{
    totalProfit=0;
    snapshot.forEach(child=>{let p=child.val();totalProfit+= (p.price-p.cost);});
    let net=totalProfit-totalExpenses;
    let el=document.getElementById('profitSummary');
    el.innerText="Net Profit: ₹"+net;
    el.style.color=net>=0?"#4caf50":"#f44336";
  });
}
updateProfit();
</script>

</body>
  </html>
