<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Clique</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {margin:0;font-family:'Roboto',sans-serif;background:#121212;color:#fff;}
/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;background:#1f1f1f;color:#fff;flex-wrap:wrap;}
#logo-container{display:flex;align-items:center;gap:10px;}
#logo-container img{height:60px;}
#logo-container h1{color:#4caf50;margin:0;font-size:60px;line-height:60px;}
#right-icons{display:flex;flex-direction:column;gap:5px;align-items:center;}
#right-icons button{background:none;border:none;color:#fff;cursor:pointer;font-size:28px;}
/* Category dropdown */
#categoryDropdown{margin:10px 15px;padding:8px;border-radius:5px;border:none;background:#2c2c2c;color:#fff;font-size:16px;width:200px;}
/* Marquee / offers slide */
#offerSlide{background:#222;color:#4caf50;padding:10px;text-align:center;font-size:18px;overflow:hidden;white-space:nowrap;}
#offerSlide span{display:inline-block;padding-right:50px;animation:marquee 15s linear infinite;}
@keyframes marquee{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}

/* Admin slide-in panel */
#adminPanel{position:fixed;top:0;right:-400px;width:350px;height:100%;background:#1f1f1f;padding:20px;transition:0.3s;overflow-y:auto;z-index:999;}
#adminPanel h2{margin-top:0;}
#adminPanel input, #adminPanel select{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:none;background:#2c2c2c;color:#fff;}
#adminPanel button{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:none;background:#4caf50;color:#fff;cursor:pointer;}
#adminClose{position:absolute;top:10px;right:15px;cursor:pointer;color:#f44336;font-weight:bold;font-size:18px;}

/* Theme toggle sun/moon */
#themeToggle i{font-size:24px;cursor:pointer;}
.light-theme{background:#fff;color:#000;}
.light-theme input, .light-theme select{background:#eee;color:#000;}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div id="logo-container">
    <img id="siteLogo" src="logo.png" alt="Logo">
    <h1>Fashion Clique</h1>
  </div>
  <div id="right-icons">
    <button id="adminLoginBtn"><i class="fas fa-user-shield"></i></button>
    <button id="themeSwitch"><i class="fas fa-sun"></i></button>
  </div>
</header>

<!-- Category Dropdown -->
<select id="categoryDropdown">
  <option value="All">All</option>
  <option value="Shoes">Shoes</option>
  <option value="Shirts">Shirts</option>
  <option value="Pants">Pants</option>
  <option value="Clothes">Clothes</option>
  <option value="Combo">Combo</option>
  <option value="Watches">Watches</option>
  <option value="Gadgets">Gadgets</option>
  <option value="Footwear">Footwear</option>
</select>

<!-- Offers Slide -->
<div id="offerSlide"><span id="offerText">Welcome to Fashion Clique! Big Offers Await!</span></div>

<!-- Container for products will go on separate page -->

<!-- Admin Panel -->
<div id="adminPanel">
<span id="adminClose" onclick="closeAdmin()">X</span>
<h2>Admin Panel</h2>
<input type="password" id="adminPass" placeholder="Enter password">
<button onclick="adminLogin()">Login</button>

<div id="adminActions" style="display:none;">
<h3>Add Product</h3>
<input type="text" id="pName" placeholder="Product Name">
<input type="number" id="pPrice" placeholder="Price in ₹">
<input type="number" id="pCost" placeholder="Cost Price in ₹">
<input type="text" id="pCategory" placeholder="Category">
<input type="text" id="pImage" placeholder="Image URL (1+ images comma separated)">
<select id="pType">
  <option value="single">Single</option>
  <option value="combo">Combo</option>
</select>
<button onclick="addProduct()">Add Product</button>

<h3>Offers</h3>
<input type="text" id="offerInput" placeholder="Enter new offer">
<button onclick="updateOffer()">Update Marquee</button>

<h3>Upload Logo</h3>
<input type="text" id="logoInput" placeholder="Logo Image URL">
<button onclick="updateLogo()">Update Logo</button>

<h3>Profit / Expenses</h3>
<input type="number" id="expenseInput" placeholder="Add Expense ₹">
<button onclick="addExpense()">Add Expense</button>
<div id="profitSummary">Net Profit: ₹0</div>

<h3>Logout</h3>
<button onclick="logoutAdmin()">Logout</button>
</div>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCi1xjKpEqjPKfEffqjFZ9Q-61INIyvqLE",
  authDomain: "fashion-clique.firebaseapp.com",
  databaseURL: "https://fashion-clique-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fashion-clique",
  storageBucket: "fashion-clique.firebasestorage.app",
  messagingSenderId: "136880158986",
  appId: "1:136880158986:web:cd0cd16849979ebf68a2f3",
  measurementId: "G-G938C4R8TV"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ---------------- Admin Panel ----------------
function showAdmin(){document.getElementById('adminPanel').style.right="0";}
function closeAdmin(){document.getElementById('adminPanel').style.right="-400px";}
document.getElementById('adminLoginBtn').onclick=showAdmin;

function adminLogin(){
  let pass=document.getElementById('adminPass').value;
  if(pass=="fc@123"){document.getElementById('adminActions').style.display="block";alert("Admin logged in");}
  else{alert("Wrong password");}
}
function logoutAdmin(){document.getElementById('adminActions').style.display="none";document.getElementById('adminPass').value="";}

// Add product
function addProduct(){
  let name=document.getElementById('pName').value;
  let price=parseInt(document.getElementById('pPrice').value);
  let cost=parseInt(document.getElementById('pCost').value);
  let category=document.getElementById('pCategory').value;
  let image=document.getElementById('pImage').value;
  let type=document.getElementById('pType').value;
  if(name && price && category && image){
    let newProdRef=db.ref("products").push();
    newProdRef.set({name,price,cost,category,image,type});
    alert("Product added");
  } else alert("Fill all fields");
}

// Update offer
function updateOffer(){
  let offer=document.getElementById('offerInput').value;
  if(offer){document.getElementById('offerText').innerText=offer;document.getElementById('offerInput').value="";}
}

// Update logo
function updateLogo(){let url=document.getElementById('logoInput').value;if(url){document.getElementById('siteLogo').src=url;}}

// Expenses / Profit
let totalProfit=0, totalExpenses=0;
function addExpense(){
  let exp=parseInt(document.getElementById('expenseInput').value);
  if(exp){totalExpenses+=exp;updateProfit();document.getElementById('expenseInput').value="";}
}
function updateProfit(){
  db.ref("products").once("value",snapshot=>{
    totalProfit=0;
    snapshot.forEach(child=>{
      let p=child.val();
      totalProfit+= (p.price-p.cost);
    });
    let net=totalProfit-totalExpenses;
    let el=document.getElementById('profitSummary');
    el.innerText="Net Profit: ₹"+net;
    el.style.color=net>=0?"#4caf50":"#f44336";
  });
}
updateProfit();

// Theme toggle
document.getElementById('themeSwitch').onclick=()=>document.body.classList.toggle('light-theme');

</script>
</body>
</html>
